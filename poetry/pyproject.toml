[tool.poetry]
name = "dgenerate"
version = "0.0.0"
description = "Stable diffusion batch image generation tool."
authors = ["Teriks <Teriks@users.noreply.github.com>"]
readme = "README.rst"
license = "BSD 3-Clause"

[tool.poetry.dependencies]
python = ">=3.10,<=3.11.6"
requests = "^2.31.0"
av = "^12.0.0"
pillow = "^10.3.0"
jinja2 = "^3.1.3"
torch = { version = "2.2.2+cu121", source = "pytorch" }
torchvision = {version = "0.17.2+cu121", source = "pytorch"}
fake-useragent = "1.4.0"
psutil = "^5.9.8"
beautifulsoup4 = "^4.12.3"
filelock = "^3.13.4"
spandrel = "^0.3.1"
spandrel_extra_arches = "^0.1.1"
tqdm = "^4.66.2"

[tool.poetry.extras]
flax = ["flax", "jax"]

[tool.poetry.scripts]
dgenerate = 'dgenerate.__init__:main'

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu121/"
priority = "explicit"

[[tool.poetry.source]]
name = "jax"
url = "https://storage.googleapis.com/jax-releases/jax_cuda_releases.html"
priority = "supplemental"